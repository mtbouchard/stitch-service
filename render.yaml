# Render Blueprint. In Render: New > Blueprint, point it at this repo. Render reads this
# file and provisions the service. (Root Directory = repo root, since this file is here.)
services:
  - type: web
    name: stitch-service
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # $APP_MODULE picks which file to serve: solution_app (the working reference) or app
    # (your code). Switch the env var below once you've implemented app.py.
    startCommand: uvicorn $APP_MODULE:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Serve the complete reference until you've implemented app.py, then change to "app".
      - key: APP_MODULE
        value: "solution_app"
      # Read by stitch.py to simulate heavier compute (seconds). 0 = as fast as possible.
      - key: STITCH_DELAY
        value: "0"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
